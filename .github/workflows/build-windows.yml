name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Download FFmpeg and FFprobe
      run: |
        Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg-bin"
        Copy-Item -Path "ffmpeg-bin\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe" -Destination "."
        Copy-Item -Path "ffmpeg-bin\ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe" -Destination "."

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --add-binary "ffmpeg.exe;." --add-binary "ffprobe.exe;." --add-data "AppIcon.ico;." --icon="AppIcon.ico" --collect-all customtkinter --collect-all imageio_ffmpeg --name "Unidown" "yt_gui.py"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Unidown-Windows-EXE
        path: dist/Unidown.exe
